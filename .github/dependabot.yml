version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: build(deps)
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: build(actions)
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
