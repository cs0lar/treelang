name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate tag, metadata, changelog, and main ancestry
        run: >-
          python scripts/validate_release.py
          --tag "$GITHUB_REF_NAME"
          --require-main

  build:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv build
      - name: Attest release distributions
        uses: actions/attest@v4
        with:
          subject-path: "dist/*"
      - uses: actions/upload-artifact@v4
        with:
          name: release-distributions
          path: dist/
          if-no-files-found: error

  smoke:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        distribution: ["*.whl", "*.tar.gz"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v4
        with:
          name: release-distributions
          path: dist/
      - name: Install and smoke-test distribution
        run: |
          python -m venv .release-venv
          .release-venv/bin/python -m pip install dist/${{ matrix.distribution }}
          .release-venv/bin/python scripts/smoke_release.py \
            --expected-version "${GITHUB_REF_NAME#v}" \
            --require-installed

  publish:
    needs: smoke
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-distributions
          path: dist/
      - name: Publish distributions with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-distributions
          path: dist/
      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/*
          --verify-tag
          --generate-notes
          --title "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY"
