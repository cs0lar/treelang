name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check treelang tests evaluation scripts cookbook/*.py
      - run: uv run ruff format --check treelang tests evaluation scripts cookbook/*.py
      - run: uv run mypy
      - run: uv run python scripts/generate_api_docs.py --check
      - name: Validate cookbook notebooks
        run: uv run python scripts/check_cookbooks.py
      - run: uv build

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen --all-groups
      - run: uv run pytest
      - name: Run deterministic offline evaluation
        if: matrix.python-version == '3.12'
        run: >-
          uv run python evaluation/eval.py
          --output evaluation-results/offline.json
          --comparison-output evaluation-results/comparison.json
      - uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage
          path: coverage.xml
      - uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: offline-evaluation
          path: evaluation-results/
